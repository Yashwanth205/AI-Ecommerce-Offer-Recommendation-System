<!DOCTYPE html>
<html>
<head>
    <title>My Account - DealAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0f172a,#1e3a8a);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .account-card{
            width:420px;
            background:white;
            border-radius:16px;
            padding:30px;
            box-shadow:0 20px 40px rgba(0,0,0,0.25);
            text-align:center;
        }

        .avatar{
            width:90px;
            height:90px;
            border-radius:50%;
            background:#2563eb;
            color:white;
            font-size:34px;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:auto;
            margin-bottom:15px;
        }

        .info-box{
            background:#f1f5f9;
            padding:12px;
            border-radius:10px;
            margin-bottom:12px;
            text-align:left;
        }

        .label{
            font-weight:600;
            color:#475569;
            font-size:14px;
        }

        .value{
            font-size:16px;
            font-weight:500;
        }
    </style>
</head>

<body>

<div class="account-card">

    <div class="avatar">
        {{ username[0]|upper }}
    </div>

    <h3 class="mb-4">{{ username }}</h3>

    <div class="info-box">
        <div class="label">Email</div>
        <div class="value">{{ email }}</div>
    </div>

    <div class="info-box">
        <div class="label">Phone Number</div>
        <div class="value">{{ phone }}</div>
    </div>

    <a href="/" class="btn btn-primary w-100 mt-3">Go to Home</a>
    <a href="/logout" class="btn btn-danger w-100 mt-2">Logout</a>

</div>

</body>
</html>
